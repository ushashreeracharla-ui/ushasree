{% extends "base.html" %}
{% block content %}

<div class="landing-hero">
    <div class="hero-overlay"></div>
    
    <div class="hero-container">
        <div class="hero-content">
            <h1 class="hero-title">Task <span>Manager</span></h1>
            <p class="hero-subtitle">
                The ultimate companion for students. Organize your assignments, 
                track your streaks, and never miss a deadline again.
            </p>
            
            <div class="hero-actions">
                <a href="{{ url_for('register') }}" class="btn-main btn-primary">Get Started</a>
                <a href="{{ url_for('login') }}" class="btn-main btn-secondary">Sign In</a>
            </div>
        </div>

        <div class="hero-image-box">
            <div class="mockup-card">
                <div class="mockup-item" style="background: #e8f5e9; border-left: 5px solid #4caf50;">✓ Assignment Finished</div>
                <div class="mockup-item">○ Study for Finals</div>
                <div class="mockup-item">○ Submit Project</div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
